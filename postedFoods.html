<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard-style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <nav class="navbar bg-body-tertiary">
        <div class="container">
            <div class="logo">
                <img src="images/give-food.png" alt="food share">
                <a class="navbar-brand" href="dashboard.html">FOOD SHARE</a>
            </div>
            <div class="d-flex gap-3" role="search">
                <a href="post.html" class="btn btn-outline-success"><span>Post Food</span></a>
                <a href="dashboard.html" class="btn btn-outline-success"><span>Find Food</span></a>
                <a href="claimed.html" class="btn btn-outline-success"><span>Claimed Food</span></a>
                <a href="#" class="btn btn-success" id="signout"><span>Signout</span></a>
            </div>
        </div>
    </nav>

    <div class="welcome-section">
        <h3 id="welcomeUser"></h3>
    </div>

    <h2 class="foods-title">Posted Foods</h2>
    <p class="text-center" id="message"></p>
    <div id="displayPostedFoods"></div>
    <div class="modal fade" id="displayClaimedFood" tabindex="-1" aria-labelledby="displayClaimedFood"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="displayClaimedFoodLabel">Modal title</h1>
                </div>
                <div class="modal-body">
                    ...
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-success" id="edit-food" data-bs-dismiss="modal">Edit
                        Food</button>
                </div>
            </div>
        </div>
    </div>
</body>
<script type="module">
    import { auth, db, signOut, collection, doc, getDocs, updateDoc, deleteDoc, onAuthStateChanged } from "./script.js";

    let user;
    let userName;

    document.getElementById('signout').addEventListener('click', () => {
        signOut(auth).then(() => {
            setTimeout(() => {
                window.location.href = 'login.html'
            }, 1500)
        }).catch((error) => {
            console.log(error);
        });
    })

    const displayUserFoods = () => {
        displayPostedFoods.innerHTML = '<div class="loader-inline"><div class="spinner-inline"></div><p>Loading foods...</p></div>';
        getDocs(collection(db, "food")).then(querySnapshot => {
            let userHasFood = false;
            let foodHTML = '';
            querySnapshot.forEach((doc) => {
                if (doc.data().userId == user.uid) {
                    userHasFood = true;
                    let food = doc.data();
                    let foodId = doc.id;
                    foodHTML += `
                        <div class="food-card">
                            <img src="${food.imageUrl}" alt="${food.food_name} image">
                            <div class="card-body">
                                <h5 class="card-title">${food.food_name}</h5>
                                <div class="card-details">
                                    <p><strong>Qty:</strong> ${food.quantity}</p>
                                    <p><strong>Expires:</strong> ${food.exp_date}</p>
                                </div>
                                <p class="card-text"><strong>Location:</strong> ${food.location}</p>
                                <div class="card-notes">
                                    <p class="card-text"><strong>Notes:</strong> ${food.notes}</p>
                                </div>
                                <div class='d-flex'>
                                    <button type="button" class="btn btn-success edit-food-btn" data-food-id="${foodId}">Edit Food</button>
                                    <button type="button" class="btn btn-danger delete-food-btn" data-food-id="${foodId}">Delete Food</button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });

            if (userHasFood) {
                displayPostedFoods.innerHTML = foodHTML;
            } else {
                displayPostedFoods.innerHTML = '<div id="noFoodsMessage">No foods posted yet. Start by posting your first food item!</div> <br> <a href="post.html" class="btn btn-outline-success"><span>Post Food</span></a>';
            }

            document.querySelectorAll('.edit-food-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const foodId = e.target.getAttribute('data-food-id');
                    showFoodModal(foodId, querySnapshot);
                });
            });
            document.querySelectorAll('.delete-food-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const foodId = e.target.getAttribute('data-food-id');
                    // console.log(foodId);

                    if (confirm('Are you sure you want to delete this food?')) {
                        try {
                            await deleteDoc(doc(db, 'food', foodId));
                            message.innerHTML = 'Food deleted successfully';
                            message.style.color = 'red'
                            setTimeout(() => {
                                message.innerHTML = ''
                            }, 3000);
                            displayUserFoods()
                        } catch (error) {
                            console.error('Error deleting food:', error);

                        }
                    }

                })
            })
        }).catch((error) => {
            displayPostedFoods.innerHTML = '<div class="alert alert-danger">Error loading foods. Please refresh the page.</div>';
            console.error('Error fetching foods:', error);
        });
    }

    const showFoodModal = (foodId, querySnapshot) => {
        querySnapshot.forEach((doc) => {
            if (doc.id === foodId) {
                let food = doc.data();


                document.getElementById('displayClaimedFoodLabel').innerHTML = `<strong>Food name: <input value='${food.food_name}' id='editFoodName'/> </strong>`
                document.querySelector('#displayClaimedFood .modal-body').innerHTML = `
                <strong>Quantity: <input value='${food.quantity}' class="" id='editQuan'/> </strong> 
                <strong>Expiration Date: <input value="${food.exp_date}" class="" id='editExpDate'/> </strong> 
                <strong>Notes: <input value="${food.notes}" class="" id='editNotes'/> </strong> 
                <strong>Contact: <input value="${food.contact || 'Unknown'}" class="" id='editContact'/> </strong> 
                <strong>Location: <input value="${food.location}" class="" id='editLoc'/> </strong> 
            `;
                // Store foodId for the save changes button
                document.querySelector('#displayClaimedFood .btn-success').setAttribute('data-food-id', foodId);
                new bootstrap.Modal(document.getElementById('displayClaimedFood')).show();
            }
        });
    }

    document.getElementById('edit-food').addEventListener('click', async () => {
        const foodId = document.getElementById('edit-food').dataset.foodId;

        if (!foodId) return;
        let updateFoodName = document.getElementById('editFoodName').value;
        let updatedQuantity = document.getElementById('editQuan').value;
        let updatedExpDate = document.getElementById('editExpDate').value
        let updatedNotes = document.getElementById('editNotes').value;
        let updatedContact = document.getElementById('editContact').value;
        let updatedLocation = document.getElementById('editLoc').value;

        // console.log(updatedQuantity, updatedContact, updatedExpDate, updatedLocation, updatedNotes);   

        try {
            await updateDoc(doc(db, "food", foodId), {
                food_name: updateFoodName,
                quantity: updatedQuantity,
                exp_date: updatedExpDate,
                notes: updatedNotes,
                contact: updatedContact,
                location: updatedLocation,
                editedAt: new Date()
            })
            message.innerText = 'Successfully updated food'
            message.style.color = 'green'
            setTimeout(() => {
                message.innerText = '';
            }, 3000)
            displayUserFoods()
            // window.location.href = 'postedFoods.html';
        } catch (error) {
            console.error('Error claiming foods:', error);
        }
    })



    onAuthStateChanged(auth, (currentUser) => {
        if (currentUser) {
            user = currentUser;
            getDocs(collection(db, "users")).then(querySnapshot => {
                querySnapshot.forEach((doc) => {
                    if (doc.data().userId == user.uid) {
                        userName = doc.data().username;
                        welcomeUser.innerHTML = `Welcome, <strong>${userName}</strong>!`;
                    }
                });
            });
            console.log("Logged in user:", user.email, user.uid);
            displayUserFoods();
        } else {
            // Redirect to login if not authenticated
            window.location.href = "login.html";
        }
    });
</script>

</html>
