<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Food — Food Share</title>
    <meta name="description" content="Share your excess food with the community and help reduce waste on Food Share.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard-style.css">
    <link rel="stylesheet" href="post-style.css">
</head>

<body>

    <!-- Fixed toast notification -->
    <div id="messageBox"></div>

    <!-- ═══════════════════════════════════════════
         NAVBAR
    ══════════════════════════════════════════════ -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <!-- Brand -->
            <div class="logo">
                <img src="images/give-food.png" alt="Food Share logo">
                <a class="navbar-brand" href="dashboard.html">Food Share</a>
            </div>

            <!-- Nav links -->
            <ul class="nav-links">
                <li><a href="dashboard.html" id="nav-dashboard">Dashboard</a></li>
                <li><a href="postedFoods.html" id="nav-posted">Posted Foods</a></li>
                <li><a href="claimed.html" id="nav-claimed">Claimed Food</a></li>
                <li><a href="post.html" class="active" id="nav-post">Post Food</a></li>
            </ul>

            <!-- Right actions -->
            <div class="nav-actions">
                <a href="#" class="btn-signout" id="signout">Sign Out</a>
                <div class="user-avatar" id="userAvatar" title="Your profile">
                    <span id="avatarInitial">U</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- ═══════════════════════════════════════════
         TWO-COLUMN LAYOUT WRAPPER
    ══════════════════════════════════════════════ -->

    <div id="post-layout">

        <!-- ── Left: Image upload column ── -->
        <div id="image-col">
            <span class="upload-field-label">Food Image</span>
            <label class="upload-drop-zone" for="food_image" id="dropZone">
                <!-- Overlay content (hidden when image is selected) -->
                <div class="upload-overlay" id="uploadOverlay">
                    <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="52" height="52"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="12" y1="18" x2="12" y2="12"/>
                        <polyline points="9 15 12 12 15 15"/>
                    </svg>
                    <strong>Upload Image</strong> <br>
                    <span>High resolution JPEG or PNG<br>Max 5 MB</span>
                </div>
                <!-- Preview image -->
                <img id="image_preview" alt="Food preview">
                <!-- Hidden file input -->
                <input type="file" id="food_image" accept="image/*">
            </label>
        </div>

        <!-- ── Right: Form fields column ── -->
        <div id="form-group">

            <!-- Loading overlay -->
            <div id="post-loader" class="hidden">
                <div class="food-loader-icon">🍽️</div>
                <p>Sharing your food…</p>
            </div>

            <!-- Form content -->
            <div id="form-content">

                <div class="form-col-header">
                    <h2>Post Food</h2>
                    <p>Fill in the details below to share with your community.</p>
                </div>

                <!-- ── Food Name ── -->
                <div class="form-field">
                    <label for="food_name">Food Name</label>
                    <input type="text" id="food_name" placeholder="e.g., Fresh Organic Apples">
                </div>

                <!-- ── Quantity + Phone Number ── -->
                <div class="form-row">
                    <div class="form-field" style="margin-bottom:0;">
                        <label for="quantity">Quantity</label>
                        <div class="input-with-chip">
                            <input type="text" id="quantity" placeholder="e.g., 5kg or 10 pieces">
                            <span class="qty-chip">QTY</span>
                        </div>
                    </div>
                    <div class="form-field" style="margin-bottom:0;">
                        <label for="contact">Phone Number</label>
                        <input type="tel" id="contact" placeholder="+234 ...">
                    </div>
                </div>

                <!-- ── Location ── -->
                <div class="form-field">
                    <label for="location">Location</label>
                    <div class="input-with-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                        <input type="text" id="location" placeholder="e.g., Bodija, Ibadan">
                    </div>
                </div>

                <!-- ── Expiry Date ── -->
                <div class="form-field">
                    <label for="exp_date">Expiry Date</label>
                    <input type="date" id="exp_date">
                </div>

                <!-- ── Additional Notes ── -->
                <div class="form-field">
                    <label for="notes">Additional Notes</label>
                    <textarea id="notes" placeholder="e.g., Allergen information, pick-up instructions..."></textarea>
                </div>

                <!-- ── Submit ── -->
                <button class="btn-post-food" id="post">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    Post Food
                </button>

                <p class="post-disclaimer">
                    By posting, you agree to our <a href="#">Community Food Safety Guidelines</a>.
                </p>

            </div><!-- /form-content -->
        </div><!-- /form-group -->

    </div><!-- /post-layout -->

    <!-- Mobile nav toggle -->
    <script>
        (function () {
            var btn  = document.getElementById("hamburgerBtn");
            var menu = document.querySelector(".nav-links");
            if (!btn || !menu) return;
            btn.addEventListener("click", function () {
                var isOpen = menu.classList.toggle("open");
                btn.classList.toggle("open", isOpen);
                btn.setAttribute("aria-expanded", String(isOpen));
            });
            menu.querySelectorAll("a").forEach(function (a) {
                a.addEventListener("click", function () {
                    menu.classList.remove("open");
                    btn.classList.remove("open");
                    btn.setAttribute("aria-expanded", "false");
                });
            });
        })();
    </script>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="bottom-nav" aria-label="Mobile navigation">
        <a href="dashboard.html" class="bottom-nav-item" id="bn-dashboard">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Dashboard
        </a>
        <a href="postedFoods.html" class="bottom-nav-item" id="bn-posted">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Posted
        </a>
        <a href="claimed.html" class="bottom-nav-item" id="bn-claimed">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            Claimed
        </a>
        <a href="post.html" class="bottom-nav-item active" id="bn-post">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            Post
        </a>
    </nav>
</body>

<script type="module">
    import { auth, db, signOut, onAuthStateChanged, collection, addDoc, getDocs } from "./script.js";

    const CLOUDINARY_URL  = "https://api.cloudinary.com/v1_1/duxscpwuz/image/upload";
    const UPLOAD_PRESET   = "food_share";

    let user;

    // ── Show feedback message ────────────────────────────────
    function showMessage(text, type) {
        const messageBox = document.getElementById('messageBox');
        // Reset state cleanly before showing new message
        messageBox.className = type;          // set type first (no 'show' yet)
        messageBox.textContent = text;
        // Trigger reflow so the transition fires even on repeated calls
        void messageBox.offsetWidth;
        messageBox.classList.add('show');     // slide in
        clearTimeout(messageBox._hideTimer);
        messageBox._hideTimer = setTimeout(() => {
            messageBox.classList.remove('show'); // slide out
        }, 3500);
    }

    // ── Auth guard ───────────────────────────────────────────
    onAuthStateChanged(auth, (currentUser) => {
        if (currentUser) {
            user = currentUser;

            // Set avatar initial from username
            getDocs(collection(db, "users")).then(qs => {
                qs.forEach(docSnap => {
                    if (docSnap.data().userId == user.uid) {
                        if (user.photoURL) {
                            document.getElementById('userAvatar').innerHTML = `<img src="${user.photoURL}" alt="Profile picture" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">`;
                        } else {
                            const name = docSnap.data().username || '';
                            document.getElementById('avatarInitial').textContent =
                                name ? name.charAt(0).toUpperCase() : 'U';
                        }
                    }
                });
            });
        } else {
            window.location.href = "login.html";
        }
    });

    // ── Sign out ─────────────────────────────────────────────
    document.getElementById('signout').addEventListener('click', (e) => {
        e.preventDefault();
        signOut(auth).then(() => {
            setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        }).catch(err => console.log(err));
    });

    // ── Image preview ─────────────────────────────────────────
    document.getElementById('food_image').addEventListener('change', () => {
        const input    = document.getElementById('food_image');
        const preview  = document.getElementById('image_preview');
        const dropZone = document.getElementById('dropZone');
        const overlay  = document.getElementById('uploadOverlay');

        if (input.files && input.files[0]) {
            preview.src = URL.createObjectURL(input.files[0]);
            preview.classList.add('show');
            overlay.style.display = 'none';
            dropZone.classList.add('has-image');
        } else {
            preview.classList.remove('show');
            overlay.style.display = '';
            dropZone.classList.remove('has-image');
        }
    });

    // ── Post food ─────────────────────────────────────────────
    document.getElementById('post').addEventListener('click', async () => {
        const loader      = document.getElementById('post-loader');
        const formContent = document.getElementById('form-content');

        const image     = document.getElementById('food_image');
        const food_name = document.getElementById('food_name').value.trim();
        const quantity  = document.getElementById('quantity').value.trim();
        const exp_date  = document.getElementById('exp_date').value;
        const location  = document.getElementById('location').value.trim();
        const contact   = document.getElementById('contact').value.trim();
        const notes     = document.getElementById('notes').value.trim();

        if (!image.files || !image.files[0]) {
            showMessage('Please upload a food image.', 'error');
            return;
        }

        if (!food_name || !quantity || !exp_date || !location || !contact) {
            showMessage('Please fill in all required fields.', 'error');
            return;
        }

        const today = new Date();
        const todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
        
        if (exp_date < todayStr) {
            showMessage('Expiration date cannot be in the past.', 'error');
            return;
        }

        // Show loader
        loader.classList.remove('hidden');
        formContent.classList.add('hidden');

        try {
            let imageUrl;
            if (image.files && image.files[0]) {
                const formData = new FormData();
                formData.append('file', image.files[0]);
                formData.append('upload_preset', UPLOAD_PRESET);

                const res  = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
                const data = await res.json();
                imageUrl   = data.secure_url;
            }

            const food = {
                food_name,
                quantity,
                exp_date,
                location,
                contact,
                notes,
                imageUrl,
                status:   'Available',
                userId:   user.uid,
                postedAt: new Date()
            };

            const docRef = await addDoc(collection(db, "food"), food);
            console.log("Document written with ID:", docRef.id);

            // Reset form
            ['food_name','quantity','exp_date','location','contact','notes'].forEach(id => {
                document.getElementById(id).value = '';
            });
            image.value = '';
            document.getElementById('image_preview').classList.remove('show');
            document.getElementById('uploadOverlay').style.display = '';
            document.getElementById('dropZone').classList.remove('has-image');

            // Hide loader, show form, show success
            loader.classList.add('hidden');
            formContent.classList.remove('hidden');
            showMessage('Food posted successfully! 🎉', 'success');

        } catch (e) {
            console.error("Error:", e);
            loader.classList.add('hidden');
            formContent.classList.remove('hidden');
            showMessage('Failed to post food. Please try again.', 'error');
        }
    });
</script>

</html>
